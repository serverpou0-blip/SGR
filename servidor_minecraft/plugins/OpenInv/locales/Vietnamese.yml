# OpenInv Vietnamese Messages Configuration

prefix: "&8[&bOpenInv&8] &7"

general:
  no-permission: "&cBạn không có quyền làm điều đó."

command:
  check:
    usage: "&cCách dùng: /openinv check <người_chơi>"
    self: "&cBạn không thể kiểm tra túi đồ của chính mình!"
    help: "&e/openinv check <người_chơi> &7- Xem túi đồ của một người chơi"
  search:
    usage: "&cCách dùng: /openinv search <vật_phẩm> <người_chơi>"
    help: "&e/openinv search <vật_phẩm> <người_chơi> &7- Tìm kiếm vật phẩm trong túi đồ của người chơi"
  freeze:
    usage: "&cCách dùng: /openinv freeze <người_chơi>"
    self: "&cBạn không thể đóng băng túi đồ của chính mình!"
    exempt: "&cNgười chơi này không thể bị đóng băng!"
    success: "&aBạn đã đóng băng túi đồ của {player}."
    help: "&e/openinv freeze <người_chơi> &7- Đóng băng túi đồ của một người chơi"
  unfreeze:
    usage: "&cCách dùng: /openinv unfreeze <người_chơi>"
    not-frozen: "&cTúi đồ của người chơi này chưa bị đóng băng!"
    success: "&aBạn đã hủy đóng băng túi đồ của {player}."
    help: "&e/openinv unfreeze <người_chơi> &7- Hủy đóng băng túi đồ của một người chơi"
  echeck:
    usage: "&cCách dùng: /openinv echeck <người_chơi>"
    self: "&cBạn không thể kiểm tra rương ender của chính mình!"
    exempt: "&cBạn không thể kiểm tra rương ender của người chơi này!"
    help: "&e/openinv echeck <người_chơi> &7- Xem rương ender của một người chơi"
  offlinecheck:
    usage: "&cCách dùng: /openinv offlineinv <người_chơi>"
    help: "&e/openinv offlineinv <người_chơi> - Chỉnh sửa túi đồ của người chơi ngoại tuyến."
  offlineecheck:
    usage: "&cCách dùng: /openinv offlineec <người_chơi>"
    help: "&e/openinv offlineec <người_chơi> - Chỉnh sửa rương ender của người chơi ngoại tuyến."
  history:
    usage: "&cCách dùng: /openinv history <người_chơi>"
    help: "&e/openinv history <người_chơi> - Xem lịch sử/bản sao lưu túi đồ"
  help:
    help: "&e/openinv help - Hiển thị tin nhắn trợ giúp này."
  reload:
    success: "&aĐã tải lại cấu hình thành công, nhưng một số thay đổi cần phải khởi động lại mới có hiệu lực."
    failed: "&cKhông thể tải lại cấu hình: {error}"
    help: "&e/openinv reload - Tải lại cấu hình plugin."
  open:
    success: "&aĐã mở túi đồ của {player}."
    self: "&cBạn không thể mở túi đồ của chính mình."
    offline-check: "&aĐã mở túi đồ ngoại tuyến của {player}. Đóng để lưu."
    offline-ender-check: "&aĐã mở rương ender ngoại tuyến của {player}. Đóng để lưu."
  close:
    success: "&aĐã đóng túi đồ của {player} thành công."
  save:
    success: "&aĐã lưu túi đồ thành công."
    error: "&cKhông thể lưu túi đồ: {error}"
  restore:
    success: "&aĐã khôi phục túi đồ thành công."
    error: "&cKhông thể khôi phục túi đồ: {error}"
  history:
    header: "&6Lịch sử túi đồ cho {player}:"
    entry: "&7- {date}: {reason}"
    empty: "&7Không tìm thấy lịch sử."
  clear:
    success: "&aĐã xóa túi đồ thành công."
    confirm: "&cBạn có chắc muốn xóa túi đồ này không? Nhập /openinv clear confirm"
  search:
    no-items: "&cKhông tìm thấy vật phẩm nào khớp với: {item} trong túi đồ của {player}"
    found-items: "&aĐã tìm thấy vật phẩm cho {player}: {items}"


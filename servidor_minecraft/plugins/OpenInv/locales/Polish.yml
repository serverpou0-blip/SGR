# OpenInv Polish Messages Configuration

prefix: "&8[&bOpenInv&8] &7"

general:
  no-permission: "&cNie masz uprawnień, aby to zrobić."

command:
  check:
    usage: "&cUżycie: /openinv check <gracz>"
    self: "&cNie możesz sprawdzić własnego ekwipunku!"
    help: "&e/openinv check <gracz> &7- Zobacz ekwipunek gracza"
  search:
    usage: "&cUżycie: /openinv search <przedmiot> <gracz>"
    help: "&e/openinv search <przedmiot> <gracz> &7- Szukaj przedmiotów w ekwipunku gracza"
  freeze:
    usage: "&cUżycie: /openinv freeze <gracz>"
    self: "&cNie możesz zamrozić własnego ekwipunku!"
    exempt: "&cTen gracz nie może zostać zamrożony!"
    success: "&aZamroziłeś ekwipunek gracza {player}."
    help: "&e/openinv freeze <gracz> &7- Zamroź ekwipunek gracza"
  unfreeze:
    usage: "&cUżycie: /openinv unfreeze <gracz>"
    not-frozen: "&cEkwipunek tego gracza nie jest zamrożony!"
    success: "&aOdmroziłeś ekwipunek gracza {player}."
    help: "&e/openinv unfreeze <gracz> &7- Odmroź ekwipunek gracza"
  echeck:
    usage: "&cUżycie: /openinv echeck <gracz>"
    self: "&cNie możesz sprawdzić własnej skrzyni kresu!"
    exempt: "&cNie możesz sprawdzić skrzyni kresu tego gracza!"
    help: "&e/openinv echeck <gracz> &7- Zobacz skrzynię kresu gracza"
  offlinecheck:
    usage: "&cUżycie: /openinv offlineinv <gracz>"
    help: "&e/openinv offlineinv <gracz> - Edytuj ekwipunek gracza offline."
  offlineecheck:
    usage: "&cUżycie: /openinv offlineec <gracz>"
    help: "&e/openinv offlineec <gracz> - Edytuj skrzynię kresu gracza offline."
  history:
    usage: "&cUżycie: /openinv history <gracz>"
    help: "&e/openinv history <gracz> - Zobacz historię/kopie ekwipunku"
  help:
    help: "&e/openinv help - Pokaż tę wiadomość pomocy."
  reload:
    success: "&aKonfiguracja została pomyślnie przeładowana."
    failed: "&cNie udało się przeładować konfiguracji: {error}"
    help: "&e/openinv reload - Przeładuj konfigurację pluginu."
  open:
    success: "&aOtwarto ekwipunek gracza {player}."
    self: "&cNie możesz otworzyć własnego ekwipunku."
    offline-check: "&aOtwarto ekwipunek offline gracza {player}. Zamknij, aby zapisać."
    offline-ender-check: "&aOtwarto skrzynię kresu offline gracza {player}. Zamknij, aby zapisać."
  close:
    success: "&aPomyślnie zamknięto ekwipunek gracza {player}."
  save:
    success: "&aEkwipunek został pomyślnie zapisany."
    error: "&cNie udało się zapisać ekwipunku: {error}"
  restore:
    success: "&aEkwipunek został pomyślnie przywrócony."
    error: "&cNie udało się przywrócić ekwipunku: {error}"
  history:
    header: "&6Historia ekwipunku dla {player}:"
    entry: "&7- {date}: {reason}"
    empty: "&7Brak historii."
  clear:
    success: "&aEkwipunek został pomyślnie wyczyszczony."
    confirm: "&cCzy na pewno chcesz wyczyścić ten ekwipunek? Wpisz /openinv clear confirm"
  search:
    no-items: "&cNie znaleziono przedmiotów pasujących do: {item} w ekwipunku gracza {player}"
    found-items: "&aZnalezione przedmioty dla gracza {player}: {items}"

freeze:

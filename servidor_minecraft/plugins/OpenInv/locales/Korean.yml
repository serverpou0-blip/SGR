# OpenInv Korean Messages Configuration

prefix: "&8[&bOpenInv&8] &7"

general:
  no-permission: "&c이를 수행할 권한이 없습니다."

command:
  check:
    usage: "&c사용법: /openinv check <player>"
    self: "&c자신의 인벤토리는 확인할 수 없습니다!"
    help: "&e/openinv check <player> &7- 플레이어의 인벤토리 보기"
  search:
    usage: "&c사용법: /openinv search <item> <player>"
    help: "&e/openinv search <item> <player> &7- 아이템 검색"
  freeze:
    usage: "&c사용법: /openinv freeze <player>"
    self: "&c자신의 인벤토리는 얼릴 수 없습니다!"
    exempt: "&c이 플레이어는 얼릴 수 없습니다!"
    success: "&a{player}의 인벤토리를 얼렸습니다."
    help: "&e/openinv freeze <player> &7- 인벤토리 얼리기"
  unfreeze:
    usage: "&c사용법: /openinv unfreeze <player>"
    not-frozen: "&c이 인벤토리는 얼려져 있지 않습니다!"
    success: "&a{player}의 인벤토리 얼림을 해제했습니다."
    help: "&e/openinv unfreeze <player> &7- 얼림 해제"
  echeck:
    usage: "&c사용법: /openinv echeck <player>"
    self: "&c자신의 엔더 상자는 확인할 수 없습니다!"
    exempt: "&c이 플레이어의 엔더 상자는 확인할 수 없습니다!"
    help: "&e/openinv echeck <player> &7- 엔더 상자 보기"
  offlinecheck:
    usage: "&c사용법: /openinv offlineinv <player>"
    help: "&e/openinv offlineinv <player> - 오프라인 인벤토리 수정."
  offlineecheck:
    usage: "&c사용법: /openinv offlineec <player>"
    help: "&e/openinv offlineec <player> - 오프라인 엔더 상자 수정."
  history:
    usage: "&c사용법: /openinv history <player>"
    help: "&e/openinv history <player> - 백업/기록 보기"
  help:
    help: "&e/openinv help - 이 도움말 표시."
  reload:
    success: "&a구성을 성공적으로 다시 로드했지만 일부 변경 사항은 적용하려면 다시 시작해야 합니다."
    failed: "&c구성 다시 로드 오류: {error}"
    help: "&e/openinv reload - 설정 다시 불러오기."
  open:
    success: "&a{player}의 인벤토리를 열었습니다."
    self: "&c자신의 인벤토리를 열 수 없습니다."
    offline-check: "&a{player}의 오프라인 인벤토리를 열었습니다. 저장하려면 닫으세요."
    offline-ender-check: "&a{player}의 오프라인 엔더 상자를 열었습니다. 저장하려면 닫으세요."
  close:
    success: "&a{player}의 인벤토리를 성공적으로 닫았습니다."
  save:
    success: "&a인벤토리를 성공적으로 저장했습니다."
    error: "&c인벤토리 저장 오류: {error}"
  restore:
    success: "&a인벤토리를 성공적으로 복원했습니다."
    error: "&c인벤토리 복원 오류: {error}"
  history:
    header: "&6{player}의 인벤토리 기록:"
    entry: "&7- {date}: {reason}"
    empty: "&7기록을 찾을 수 없습니다."
  clear:
    success: "&a인벤토리를 성공적으로 지웠습니다."
    confirm: "&c정말로 이 인벤토리를 지우시겠습니까? /openinv clear confirm 을 입력하세요"
  search:
    no-items: "&c{player}의 인벤토리에서 {item} 와(과) 일치하는 아이템을 찾을 수 없습니다."
    found-items: "&a{player}의 아이템을 찾았습니다: {items}"

freeze:
  frozen: "&c관리자가 귀하의 인벤토리를 동결했습니다."
  unfrozen: "&a귀하의 인벤토리 동결이 해제되었습니다."
  warning: "&c현재 귀하의 인벤토리가 동결되어 있습니다."

shulker:
  title: "&8셜커 뷰어"
  save-back: "&a저장 및 돌아가기"
  save-close: "&c저장 및 닫기"
  not-a-shulker: "&c그것은 셜커 상자가 아닙니다!"
  corrupted: "&c손상된 셜커 상자 데이터."
  modified-cancelled: "&c소유자가 셜커 상자를 수정/이동했습니다. 편집이 취소되었습니다."
  saved: "&a셜커 상자를 {player} 에 저장했습니다."
  saved-offline: "&a설켜 상자를 오프라인 데이터에 저장했습니다."
  saved-preview: "&a셜커 상자를 저장했습니다 (미리보기)."
  debug-opening: "&a셜커 상자 편집기를 여는 중..."

event:
  inventory-modified: "&a인벤토리를 수정하고 저장했습니다."
  inventory-restored: "&a인벤토리를 이전 상태로 복원했습니다."
  inventory-saved: "&a인벤토리를 성공적으로 저장했습니다."
  offline-inventory-update: "&e오프라인인 동안 관리자가 귀하의 인벤토리를 업데이트했습니다."
  offline-enderchest-update: "&e오프라인 상태인 동안 관리자가 귀하의 엔더 상자를 업데이트했습니다."

error:
  player-only: "&c이 명령어는 플레이어만 사용할 수 있습니다!"
  player-not-found: "&c플레이어를 찾을 수 없습니다."
  generic: "&c오류가 발생했습니다: {error}"
  invalid-player: "&c잘못된 플레이어 이름입니다."
  invalid-world: "&c잘못된 세계입니다."
  world-not-loaded: "&c세계가 로드되지 않았습니다."
  inventory-in-use: "&c해당 인벤토리는 현재 다른 플레이어가 보고 있습니다."
  save-failed: "&c인벤토리 저장 실패: {error}"
  load-failed: "&c인벤토리 로드 실패: {error}"
  database-error: "&c데이터베이스 오류: {error}"
  offline-online-player: "&c온라인 플레이어에게는 offlinecheck을 사용할 수 없습니다."
  online-warning: "&e경고: 플레이어가 온라인 상태입니다. 실시간으로 편집하려면 /openinv check를 사용하세요."
  no-snapshot: "&c{player}에 저장된 인벤토리 데이터를 찾을 수 없습니다"
  no-snapshot-standard: "&c저장된 표준 인벤토리 데이터를 찾을 수 없습니다 (EC 데이터만 찾음)."

player-offline: "&c플레이어가 오프라인입니다."
player-never-played: "&c{player} 플레이어는 이 서버에서 플레이한 적이 없습니다."
inventory-not-found: "&c인벤토리를 찾을 수 없습니다."
invalid-inventory: "&c잘못된 인벤토리 유형입니다."


welcome:
  welcome: "&e환영합니다, {player}님!"
  commands: "&e명령어 목록:"

# ║  이 파일을 사용하여 플러그인 메시지의 언어를 사용자 정의하세요.                    ║
# ║  'locales' 폴더 안에서 다른 번역 파일들을 찾을 수 있습니다.                        ║
# ║                                                                                    ║
# ║  사용자 정의 언어를 사용하려면 'locales' 내의 기존 파일을 복사하고,                ║
# ║  이름을 변경한 뒤 메시지를 번역하고, messages.yml의 설정을                         ║

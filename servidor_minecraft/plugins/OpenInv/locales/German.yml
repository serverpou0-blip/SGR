# ║  Nutze diese Datei, um die gewünschte Sprache für die Plugin-Nachrichten           ║
# ║  anzupassen. Andere Übersetzungen findest du im Ordner 'locales'.                  ║
# ║                                                                                    ║
# ║  Um eine eigene Sprache zu verwenden, kopiere eine Datei unter 'locales',          ║

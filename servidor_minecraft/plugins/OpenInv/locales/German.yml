player-offline: "&cDieser Spieler ist offline."
player-never-played: "&cDer Spieler {player} hat noch nie auf diesem Server gespielt."
inventory-not-found: "&cInventar nicht gefunden."
invalid-inventory: "&cUngültiger Inventartyp."


welcome:

# OpenInv German Messages Configuration

prefix: "&8[&bOpenInv&8] &7"

general:
  no-permission: "&cDu hast keine Berechtigung dafür."

command:
  check:
    usage: "&cVerwendung: /openinv check <player>"
    self: "&cDu kannst dein eigenes Inventar nicht überprüfen!"
    help: "&e/openinv check <player> &7- Inventar eines Spielers anzeigen"
  search:
    usage: "&cVerwendung: /openinv search <item> <player>"
    help: "&e/openinv search <item> <player> &7- Gegenstände suchen"
  freeze:
    usage: "&cVerwendung: /openinv freeze <player>"
    self: "&cDu kannst dein eigenes Inventar nicht einfrieren!"
    exempt: "&cDieser Spieler kann nicht eingefroren werden!"
    success: "&aDu hast das Inventar von {player} eingefroren."
    help: "&e/openinv freeze <player> &7- Inventar einfrieren"
  unfreeze:
    usage: "&cVerwendung: /openinv unfreeze <player>"
    not-frozen: "&cDieses Inventar ist nicht eingefroren!"
    success: "&aDu hast das Inventar von {player} freigegeben."
    help: "&e/openinv unfreeze <player> &7- Inventar freigeben"
  echeck:
    usage: "&cVerwendung: /openinv echeck <player>"
    self: "&cDu kannst deine eigene Endertruhe nicht überprüfen!"
    exempt: "&cDu kannst diese Endertruhe nicht überprüfen!"
    help: "&e/openinv echeck <player> &7- Endertruhe anzeigen"
  offlinecheck:
    usage: "&cVerwendung: /openinv offlineinv <player>"
    help: "&e/openinv offlineinv <player> - Offline-Inventar bearbeiten."
  offlineecheck:
    usage: "&cVerwendung: /openinv offlineec <player>"
    help: "&e/openinv offlineec <player> - Offline-Endertruhe bearbeiten."
  history:
    usage: "&cVerwendung: /openinv history <player>"
    help: "&e/openinv history <player> - Inventar-Historie/Backups anzeigen"
  help:
    help: "&e/openinv help - Diese Hilfenachricht anzeigen."
  reload:
    success: "&aKonfiguration erfolgreich neu geladen, aber einige Änderungen erfordern einen Neustart, um wirksam zu werden."
    failed: "&cFehler beim Neuladen der Konfiguration: {error}"
    help: "&e/openinv reload - Plugin-Konfiguration neu laden."
  open:
    success: "&aInventar von {player} geöffnet."
    self: "&cDu kannst dein eigenes Inventar nicht öffnen."
    offline-check: "&aOffline-Inventar für {player} geöffnet. Schließen zum Speichern."
    offline-ender-check: "&aOffline-Enderkiste für {player} geöffnet. Schließen zum Speichern."
  close:
    success: "&aInventar von {player} erfolgreich geschlossen."
  save:
    success: "&aInventar erfolgreich gespeichert."
    error: "&cFehler beim Speichern des Inventars: {error}"
  restore:
    success: "&aInventar erfolgreich wiederhergestellt."
    error: "&cFehler bei der Wiederherstellung des Inventars: {error}"
  history:
    header: "&6Inventarverlauf für {player}:"
    entry: "&7- {date}: {reason}"
    empty: "&7Kein Verlauf gefunden."
  clear:
    success: "&aInventar erfolgreich geleert."
    confirm: "&cBist du sicher, dass du dieses Inventar leeren möchtest? Tippe /openinv clear confirm"
  search:
    no-items: "&cKeine Gegenstände passend zu {item} im Inventar von {player} gefunden."
    found-items: "&aGegenstände für {player} gefunden: {items}"

freeze:
  frozen: "&cDein Inventar wurde von einem Administrator eingefroren."
  unfrozen: "&aDein Inventar wurde aufgetaut."
  warning: "&cDein Inventar ist derzeit eingefroren."


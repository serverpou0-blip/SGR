# ║                             ℹ TAAL CONFIGURATIE ℹ                                  ║
# ║                                                                                    ║
# ║  Gebruik dit bestand om de gewenste taal voor de plugin berichten aan te passen.   ║
# ║  Andere vertalingen staan in de 'locales' map.                                     ║
# ║                                                                                    ║
# ║  Om een aangepaste taal te maken, kopieer je een bestand uit 'locales', hernomen,  ║

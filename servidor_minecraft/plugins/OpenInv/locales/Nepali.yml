# OpenInv Nepali Messages Configuration

prefix: "&8[&bOpenInv&8] &7"

general:
  no-permission: "&cTapailai testo garne anumati chaina."

command:
  check:
    usage: "&cPrayog: /openinv check <player>"
    self: "&cTapaile aafnai inventory check garna saknu hunna!"
    help: "&e/openinv check <player> &7- Khiladiko inventory hernus"
  search:
    usage: "&cPrayog: /openinv search <item> <player>"
    help: "&e/openinv search <item> <player> &7- Khiladiko inventory ma item khojnus"
  freeze:
    usage: "&cPrayog: /openinv freeze <player>"
    self: "&cTapaile aafnai inventory freeze garna saknu hunna!"
    exempt: "&cYo khiladilai freeze garna sakidaina!"
    success: "&aTapaile {player} ko inventory freeze garnu bhayo."
    help: "&e/openinv freeze <player> &7- Khiladiko inventory freeze garnus"
  unfreeze:
    usage: "&cPrayog: /openinv unfreeze <player>"
    not-frozen: "&cYo khiladiko inventory freeze chaina!"
    success: "&aTapaile {player} ko inventory unfreeze garnu bhayo."
    help: "&e/openinv unfreeze <player> &7- Khiladiko inventory unfreeze garnus"
  echeck:
    usage: "&cPrayog: /openinv echeck <player>"
    self: "&cTapaile aafno ender chest check garna saknu hunna!"
    exempt: "&cTapaile yo khiladiko ender chest check garna saknu hunna!"
    help: "&e/openinv echeck <player> &7- Khiladiko ender chest hernus"
  offlinecheck:
    usage: "&cPrayog: /openinv offlineinv <player>"
    help: "&e/openinv offlineinv <player> - Offline khiladiko inventory edit garnus."
  offlineecheck:
    usage: "&cPrayog: /openinv offlineec <player>"
    help: "&e/openinv offlineec <player> - Offline khiladiko ender chest edit garnus."
  history:
    usage: "&cPrayog: /openinv history <player>"
    help: "&e/openinv history <player> - Inventory history/backups hernus"
  help:
    help: "&e/openinv help - Yo help message hernus."
  reload:
    success: "&aConfiguration safaltapurvak reload bhayo, tara kehi pariwartan haru lagu garna restart ko avashyakta huncha."
    failed: "&cConfiguration reload garna maa error: {error}"
    help: "&e/openinv reload - Plugin configuration lai reload garnus."
  open:
    success: "&a{player} ko inventory kholiyo."
    self: "&cTapaile aafno inventory kholna saknu hunna."
    offline-check: "&a{player} ko offline inventory kholiyo. Save garna close garnuhos."
    offline-ender-check: "&a{player} ko offline ender chest kholiyo. Save garna close garnuhos."
  close:
    success: "&a{player} ko inventory safaltapurvak banda gariyo."
  save:
    success: "&aInventory safaltapurvak save bhayo."
    error: "&cInventory save garna error: {error}"
  restore:
    success: "&aInventory safaltapurvak purwa awastha maa farkaiyo."
    error: "&cInventory restore garna error: {error}"
  history:
    header: "&6{player} ko inventory history:"
    entry: "&7- {date}: {reason}"
    empty: "&7Kunai history bhetiyana."
  clear:
    success: "&aInventory safaltapurvak clear gariyo."
    confirm: "&cKe tapai pakka yo inventory clear garna chahanuhuncha? Type garnuhos /openinv clear confirm"
  search:
    no-items: "&c{player} ko inventory maa {item} sanga mail khane kunai item bhetiyana."
    found-items: "&a{player} ko lagi item haru bhetiyo: {items}"


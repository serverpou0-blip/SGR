# OpenInv Turkish Messages Configuration

prefix: "&8[&bOpenInv&8] &7"

general:
  no-permission: "&cBunu yapmak için izniniz yok."

command:
  check:
    usage: "&cKullanım: /openinv check <oyuncu>"
    self: "&cKendi envanterinizi kontrol edemezsiniz!"
    help: "&e/openinv check <oyuncu> &7- Bir oyuncunun envanterini görüntüle"
  search:
    usage: "&cKullanım: /openinv search <eşya> <oyuncu>"
    help: "&e/openinv search <eşya> <oyuncu> &7- Oyuncunun envanterinde eşya ara"
  freeze:
    usage: "&cKullanım: /openinv freeze <oyuncu>"
    self: "&cKendi envanterinizi donduramazsınız!"
    exempt: "&cBu oyuncu dondurulamaz!"
    success: "&a{player} adlı oyuncunun envanterini dondurdunuz."
    help: "&e/openinv freeze <oyuncu> &7- Bir oyuncunun envanterini dondur"
  unfreeze:
    usage: "&cKullanım: /openinv unfreeze <oyuncu>"
    not-frozen: "&cBu oyuncunun envanteri dondurulmamış!"
    success: "&a{player} adlı oyuncunun envanterinin dondurulmasını kaldırdınız."
    help: "&e/openinv unfreeze <oyuncu> &7- Bir oyuncunun envanterini çöz"
  echeck:
    usage: "&cKullanım: /openinv echeck <oyuncu>"
    self: "&cKendi ender sandığınızı kontrol edemezsiniz!"
    exempt: "&cBu oyuncunun ender sandığını kontrol edemezsiniz!"
    help: "&e/openinv echeck <oyuncu> &7- Bir oyuncunun ender sandığını görüntüle"
  offlinecheck:
    usage: "&cKullanım: /openinv offlineinv <oyuncu>"
    help: "&e/openinv offlineinv <oyuncu> - Çevrimdışı oyuncunun envanterini düzenle."
  offlineecheck:
    usage: "&cKullanım: /openinv offlineec <oyuncu>"
    help: "&e/openinv offlineec <oyuncu> - Çevrimdışı oyuncunun ender sandığını düzenle."
  history:
    usage: "&cKullanım: /openinv history <oyuncu>"
    help: "&e/openinv history <oyuncu> - Envanter geçmişini/yedeklerini görüntüle"
  help:
    help: "&e/openinv help - Bu yardım mesajını göster."
  reload:
    success: "&aYapılandırma başarıyla yeniden yüklendi, ancak bazı değişikliklerin etkili olması için yeniden başlatma gerekiyor."
    failed: "&cYapılandırma yeniden yüklenemedi: {error}"
    help: "&e/openinv reload - Eklenti yapılandırmasını yeniden yükler."
  open:
    success: "&a{player} adlı oyuncunun envanteri açıldı."
    self: "&cKendi envanterinizi açamazsınız."
    offline-check: "&a{player} adlı oyuncunun çevrimdışı envanteri açıldı. Kaydetmek için kapatın."
    offline-ender-check: "&a{player} adlı oyuncunun çevrimdışı ender sandığı açıldı. Kaydetmek için kapatın."
  close:
    success: "&a{player} adlı oyuncunun envanteri başarıyla kapatıldı."
  save:
    success: "&aEnvanter başarıyla kaydedildi."
    error: "&cEnvanter kaydedilemedi: {error}"
  restore:
    success: "&aEnvanter başarıyla geri yüklendi."
    error: "&cEnvanter geri yüklenemedi: {error}"
  history:
    header: "&6{player} için envanter geçmişi:"
    entry: "&7- {date}: {reason}"
    empty: "&7Geçmiş bulunamadı."
  clear:
    success: "&aEnvanter başarıyla temizlendi."
    confirm: "&cBu envanteri temizlemek istediğinize emin misiniz? /openinv clear confirm yazın"
  search:
    no-items: "&c{player} envanterinde {item} ile eşleşen eşya bulunamadı"
    found-items: "&a{player} için eşyalar bulundu: {items}"


# ║  ใช้ไฟล์นี้เพื่อปรับแต่งภาษาที่คุณต้องการสำหรับข้อความของปลั๊กอิน                  ║
# ║  คุณสามารถค้นหาไฟล์การแปลอื่นๆ ได้ภายในโฟลเดอร์ 'locales'                          ║
# ║                                                                                    ║
# ║  เพื่อใช้ภาษาที่กำหนดเอง โปรดคัดลอกไฟล์ที่มีอยู่ใน 'locales' เปลี่ยนชื่อ           ║
# ║  แปลข้อความ และเปลี่ยนการตั้งค่าใน messages.yml เป็นชื่อไฟล์ใหม่ของคุณ             ║
# ╚════════════════════════════════════════════════════════════════════════════════════╝

# OpenInv Thai Messages Configuration

prefix: "&8[&bOpenInv&8] &7"

general:
  no-permission: "&cคุณไม่มีสิทธิ์ในการทำเช่นนั้น"

command:
  check:
    usage: "&cวิธีใช้: /openinv check <ผู้เล่น>"
    self: "&cคุณไม่สามารถดูช่องเก็บของของตัวเองได้!"
    help: "&e/openinv check <ผู้เล่น> &7- ดูช่องเก็บของของผู้เล่น"
  search:
    usage: "&cวิธีใช้: /openinv search <ไอเทม> <ผู้เล่น>"
    help: "&e/openinv search <ไอเทม> <ผู้เล่น> &7- ค้นหาไอเทมในช่องเก็บของของผู้เล่น"
  freeze:
    usage: "&cวิธีใช้: /openinv freeze <ผู้เล่น>"
    self: "&cคุณไม่สามารถแช่แข็งช่องเก็บของของตัวเองได้!"
    exempt: "&cผู้เล่นคนนี้ไม่สามารถถูกแช่แข็งได้!"
    success: "&aคุณได้แช่แข็งช่องเก็บของของ {player} เรียบร้อยแล้ว"
    help: "&e/openinv freeze <ผู้เล่น> &7- แช่แข็งช่องเก็บของของผู้เล่น"
  unfreeze:
    usage: "&cวิธีใช้: /openinv unfreeze <ผู้เล่น>"
    not-frozen: "&cช่องเก็บของของผู้เล่นคนนี้ไม่ได้ถูกแช่แข็ง!"
    success: "&aคุณได้ยกเลิกการแช่แข็งช่องเก็บของของ {player} เรียบร้อยแล้ว"
    help: "&e/openinv unfreeze <ผู้เล่น> &7- ยกเลิกการแช่แข็งช่องเก็บของของผู้เล่น"
  echeck:
    usage: "&cวิธีใช้: /openinv echeck <ผู้เล่น>"
    self: "&cคุณไม่สามารถดูเอนเดอร์เชสท์ของตัวเองได้!"
    exempt: "&cคุณไม่สามารถดูเอนเดอร์เชสท์ของผู้เล่นคนนี้ได้!"
    help: "&e/openinv echeck <ผู้เล่น> &7- ดูเอนเดอร์เชสท์ของผู้เล่น"
  offlinecheck:
    usage: "&cวิธีใช้: /openinv offlineinv <ผู้เล่น>"
    help: "&e/openinv offlineinv <ผู้เล่น> - แก้ไขช่องเก็บของผู้เล่นที่ออฟไลน์"
  offlineecheck:
    usage: "&cวิธีใช้: /openinv offlineec <ผู้เล่น>"
    help: "&e/openinv offlineec <ผู้เล่น> - แก้ไขเอนเดอร์เชสท์ของผู้เล่นที่ออฟไลน์"
  history:
    usage: "&cวิธีใช้: /openinv history <ผู้เล่น>"
    help: "&e/openinv history <ผู้เล่น> - ดูประวัติ/ข้อมูลสำรองของช่องเก็บของ"
  help:
    help: "&e/openinv help - แสดงข้อความช่วยเหลือนี้"
  reload:
    success: "&aโหลดการตั้งค่าระบบใหม่สำเร็จ แต่การเปลี่ยนแปลงบางอย่างต้องรีสตาร์ทจึงจะมีผล"
    failed: "&cไม่สามารถโหลดการตั้งค่าระบบใหม่ได้: {error}"
    help: "&e/openinv reload - โหลดการตั้งค่าปลั๊กอินใหม่"
  open:
    success: "&aเปิดช่องเก็บของของ {player} เรียบร้อยแล้ว"
    self: "&cคุณไม่สามารถเปิดช่องเก็บของของตัวเองได้"
    offline-check: "&aเปิดช่องเก็บของออฟไลน์ของ {player} เรียบร้อย ปิดเพื่อทำการบันทึก"
    offline-ender-check: "&aเปิดเอนเดอร์เชสท์ออฟไลน์ของ {player} เรียบร้อย ปิดเพื่อทำการบันทึก"
  close:
    success: "&aปิดช่องเก็บของของ {player} สำเร็จ"
  save:
    success: "&aบันทึกช่องเก็บของสำเร็จ"
    error: "&cไม่สามารถบันทึกช่องเก็บของได้: {error}"
  restore:
    success: "&aกู้คืนช่องเก็บของสำเร็จ"
    error: "&cไม่สามารถกู้คืนช่องเก็บของได้: {error}"
  history:
    header: "&6ประวัติช่องเก็บของของ {player}:"
    entry: "&7- {date}: {reason}"
    empty: "&7ไม่พบประวัติการแก้ไขข้อมูล"
  clear:
    success: "&aล้างข้อมูลช่องเก็บของสำเร็จ"
    confirm: "&cคุณแน่ใจหรือไม่ว่าต้องการล้างข้อมูลนี้? พิมพ์ /openinv clear confirm"
  search:
    no-items: "&cไม่พบไอเทมที่ตรงกัน: {item} ในช่องเก็บของของ {player}"
    found-items: "&aพบไอเทมสำหรับ {player}: {items}"

freeze:
  frozen: "&cช่องเก็บของของคุณถูกแช่แข็งโดยผู้ดูแลระบบ"
  unfrozen: "&aช่องเก็บของของคุณไม่ได้ถูกแช่แข็งอีกต่อไป"
  warning: "&cช่องเก็บของของคุณกำลังถูกแช่แข็งอยู่"

shulker:
  title: "&8เครื่องดูชัลเกอร์"
  save-back: "&aบันทึก และ ถอยกลับ"
  save-close: "&cบันทึก และ ปิด"
  not-a-shulker: "&cนั่นไม่ใช่กล่องชัลเกอร์!"
  corrupted: "&cข้อมูลกล่องชัลเกอร์เสียหาย"
  modified-cancelled: "&cกล่องชัลเกอร์ถูกแก้ไขหรือถอดถอนโดยเจ้าของ ยกเลิกการแก้ไข"
  saved: "&aบันทึกกล่องชัลเกอร์ให้ {player} เรียบร้อย"
  saved-offline: "&aบันทึกกล่องชัลเกอร์เข้าสู่ข้อมูลออฟไลน์เรียบร้อย"
  saved-preview: "&aบันทึกกล่องชัลเกอร์แล้ว (ตัวอย่าง)"
  debug-opening: "&aกำลังเปิดตัวแก้ไขกล่องชัลเกอร์..."

event:
  inventory-modified: "&aช่องเก็บของถูกแก้ไขและบันทึกข้อมูลเรียบร้อยแล้ว"
  inventory-restored: "&aกู้คืนช่องเก็บของกลับสู่สถานะก่อนหน้าสำเร็จ"
  inventory-saved: "&aบันทึกช่องเก็บของสำเร็จ"
  offline-inventory-update: "&eช่องเก็บของของคุณได้รับการอัพเดตโดยผู้ดูแลระบบในขณะที่คุณออฟไลน์"
  offline-enderchest-update: "&eเอนเดอร์เชสท์ของคุณอัพเดตโดยผู้ดูแลระบบในขณะที่คุณออฟไลน์"

